schemas:
  - name: "md-content-extraction"
    config:
      ocr:
        provider: "openrouter"
        model: "openai/gpt-5-nano"
        prompt: |
          Transcribe image content into Markdown. Apply the following structural mapping rules:

          1. Typography & Hierarchy: Map visual hierarchies to standard Markdown headings (#), lists (-, 1.), and emphasis (*, **).
          2. Source References: Map pill-shaped file/line tags to inline code brackets: `[filename line-numbers]`.
          3. Tables: Map visual grids to standard Markdown tables (| Column |).
          4. Diagrams: Map flowcharts and ERDs to Mermaid.js code blocks (```mermaid). Represent network topologies unsuited for Mermaid as nested bulleted lists defining nodes and hierarchical edges.
          5. UI Elements: Map collapsible sections to standard Markdown headings. Discard HTML tags.

          OUTPUT CONSTRAINTS:
          - Output raw Markdown text only.
          - Omit conversational preamble and postscript.
          - Omit the master ```markdown codeblock around the total output.
        language: "eng"
        format: "md"
