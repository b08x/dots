# Fedora Sway theme setup
# Applies GTK theme settings via gsettings

exec_always {
  gsettings set org.gnome.desktop.interface icon-theme "{{ sway_desktop_theme }}"
  gsettings set org.gnome.desktop.interface cursor-theme "{{ sway_desktop_theme }}"
  gsettings set org.gnome.desktop.interface font-name "Roboto 11"
  gsettings set org.gnome.desktop.interface monospace-font-name "JetBrains Mono 10"

  gsettings set org.freedesktop.appearance color-scheme "prefer-dark"
  gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
}
