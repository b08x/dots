active_model = "mistral-medium-3.5"
vim_keybindings = true
disable_welcome_banner_animation = true
autocopy_to_clipboard = true
displayed_workdir = ""
auto_compact_threshold = 500000
context_warnings = true
auto_approve = false
system_prompt_id = "cli"
include_commit_signature = true
include_model_info = true
include_project_context = true
include_prompt_detail = true
enable_update_checks = true
enable_auto_update = true
api_timeout = 1800.0
voice_mode_enabled = true

[config.tools.read_file]
permission = "always"

[config.tools.grep]
permission = "always"

[[mcp_servers]]
transport = "http"
name = "context7"
url = "https://mcp.context7.com/mcp"
api_key_env = "CONTEXT7_API_KEY"
api_key_header = "X-API-Key"
api_key_format = "{token}"
startup_timeout_sec = 30.0

[[mcp_servers]]
transport = "http"
name = "deepwiki"
url = "https://mcp.deepwiki.com/mcp"
startup_timeout_sec = 30.0

[[mcp_servers]]
transport = "stdio"
name = "playwright"
command = "npx"
args = [
    "@playwright/mcp@latest",
]
startup_timeout_sec = 30.0
sampling_enabled = false
agent_paths = [
    "~/.vibe/agents",
]
enabled_agents = [
    "osbuild",
    "osbuild-subagent",
    "file-reader-subagent",
    "gir",
    "critique-agent",
    "critique__requirements-validator",
    "critique__solution-architect",
    "critique__code-quality-reviewer",
]
disabled_agents = []
installed_agents = [
    "lean",
    "osbuild",
    "osbuild-subagent",
]
skill_paths = [
    "~/.vibe/skills",
    "~/.vibe/skills/github",
]
enabled_skills = [
    "analyse",
    "refactor",
    "bluefin-builder",
    "github-auth",
    "github-repo-management",
    "critique",
    "readme-generator",
    "graphify",
]
disabled_skills = []

[[providers]]
name = "mistral"
api_base = "https://api.mistral.ai/v1"
api_key_env_var = "MISTRAL_API_KEY"
backend = "mistral"
reasoning_field_name = "reasoning_content"

[[providers]]
name = "openrouter"
api_base = "https://openrouter.ai/api/v1"
api_key_env_var = "OPENROUTER_API_KEY"
backend = "generic"
api_style = "openai"
reasoning_field_name = "reasoning_content"

[[models]]
name = "tencent/hy3-preview"
provider = "openrouter"
alias = "hy3-preview"
temperature = 0.3
input_price = 0.0
output_price = 0.0

[[models]]
name = "mistral-vibe-cli-latest"
provider = "mistral"
alias = "mistral-medium-3.5"
temperature = 0.2
thinking = "high"
input_price = 1.5
output_price = 7.5

[[models]]
name = "mistral-small-latest"
provider = "mistral"
alias = "mistral-small"
temperature = 0.2
input_price = 0.1
output_price = 0.3

[[models]]
name = "devstral-2512"
provider = "mistral"
alias = "devstral-2"
temperature = 0.2
thinking = "high"

[project_context]
max_chars = 300000
default_commit_count = 30
max_doc_bytes = 262144
truncation_buffer = 8000
max_depth = 15
max_files = 10000
max_dirs_per_level = 100
timeout_seconds = 30.0

[session_logging]
save_dir = "~/.vibe/logs/session"
session_prefix = "accuracy-session"
enabled = true

[tools.ask_user_question]
permission = "always"

[tools.bash]
permission = "ask"
allowlist = [
    "cat",
    "echo",
    "file",
    "find",
    "git",
    "git diff",
    "git log",
    "git status",
    "head",
    "ls",
    "pwd",
    "stat",
    "tail",
    "tree",
    "uname",
    "wc",
    "which",
    "whoami",
    "python3",
    "node",
    "npm",
    "yarn",
    "cargo",
    "go",
    "rustc",
    "javac",
    "mvn",
    "grep",
    "awk",
    "sed",
    "sort",
    "uniq",
    "cut",
    "tr",
]
denylist = [
    "rm",
    "rm -rf",
    "curl | bash",
    "wget | bash",
    "su",
    "passwd",
    "useradd",
    "usermod",
    "groupadd",
    "apt",
    "yum",
    "dnf",
    "pacman",
    "chmod -R",
    "chown",
    "chgrp",
    "dd",
    "mkfs",
    "gdb",
    "pdb",
    "strace",
    "tcpdump",
    "wireshark",
    "tshark",
    "nmap",
    "> /dev/sd*",
    "mv /",
    "cp -r /",
]

[tools.grep]
permission = "always"

[tools.read_file]
permission = "always"
max_read_bytes = 262144

[tools.search_replace]
permission = "ask"
allowlist = [
    "./**/*",
    "~/.vibe/skills/*",
]
denylist = [
    "~/.vibe/agents/*",
    "~/.vibe/config.toml",
    "~/.ssh/*",
    "/etc/*",
    "/usr/*",
    "/bin/*",
    "/sbin/*",
    "/lib/*",
]

[tools.task]
permission = "always"

[tools.todo]
permission = "always"

[tools.write_file]
permission = "ask"
denylist = [
    "~/.vibe/agents/*",
    "~/.vibe/config.toml",
    "~/.ssh/*",
    "/etc/*",
    "/usr/*",
    "/bin/*",
    "/sbin/*",
    "/lib/*",
    "/var/*",
]
