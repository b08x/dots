active_model = "mistral-medium-3.5"
vim_keybindings = true
disable_welcome_banner_animation = true
autocopy_to_clipboard = true
displayed_workdir = ""
auto_compact_threshold = 500000
context_warnings = true
system_prompt_id = "cli"
include_commit_signature = true
include_model_info = true
include_project_context = true
include_prompt_detail = true
enable_update_checks = true
enable_auto_update = true
api_timeout = 1800.0
voice_mode_enabled = true
agent_paths = [
    "~/.vibe/agents",
]
disabled_agents = []
installed_agents = [
    "lean",
    "agent-creator",
    "other-steve",
    "project-recall",
]
skill_paths = [
    "~/.vibe/skills",
    "~/.syncopated/skills",
    ".agents/skills/",
]
disabled_skills = [
    "workflows",
]
theme = "flexoki"
applied_migrations = [
    "bash_read_only_defaults_v1",
]
connectors = [
    { name = "deepwiki", disabled = true },
    { name = "github_app", disabled = false },
]

[[mcp_servers]]
name = "trackboi"
transport = "stdio"
command = "trackboi"
args = [
    "mcp",
]

[[mcp_servers]]
transport = "http"
name = "context7"
url = "https://mcp.context7.com/mcp"
startup_timeout_sec = 30.0

[mcp_servers.auth]
type = "static"
api_key_env = "CONTEXT7_API_KEY"
api_key_header = "X-API-Key"
api_key_format = "{token}"

[[mcp_servers]]
transport = "http"
name = "deepwiki"
url = "https://mcp.deepwiki.com/mcp"
startup_timeout_sec = 30.0

[[mcp_servers]]
transport = "http"
name = "qmd"
url = "http://localhost:8181/mcp"
startup_timeout_sec = 30.0

[[providers]]
name = "mistral"
api_base = "https://api.mistral.ai/v1"
api_key_env_var = "MISTRAL_VIBE_API_KEY"
backend = "mistral"
reasoning_field_name = "reasoning_content"

[[providers]]
name = "openrouter"
api_base = "https://openrouter.ai/api/v1"
api_key_env_var = "OPENROUTER_API_KEY"
backend = "generic"
api_style = "openai"
reasoning_field_name = "reasoning_content"

[[models]]
name = "minimax/minimax-m2.7"
provider = "openrouter"
alias = "minimax-m2.7"
temperature = 0.3
input_price = 0.0
output_price = 0.0

[[models]]
name = "mistral-vibe-cli-latest"
provider = "mistral"
alias = "mistral-medium-3.5"
temperature = 0.2
thinking = "medium"
input_price = 1.5
output_price = 7.5
supports_images = true

[[models]]
name = "mistral-small-latest"
provider = "mistral"
alias = "mistral-small"
temperature = 0.2
input_price = 0.1
output_price = 0.3

[[models]]
name = "devstral-2512"
provider = "mistral"
alias = "devstral-2"
temperature = 0.2
thinking = "high"

[project_context]
default_commit_count = 30
timeout_seconds = 30.0

[session_logging]
save_dir = "~/.vibe/logs/session"
enabled = true

[tools.ask_user_question]
permission = "always"

[tools.bash]
permission = "ask"
allowlist = [
    "awk",
    "basename",
    "cargo",
    "cat",
    "cd",
    "choose",
    "comm",
    "cut",
    "date",
    "diff",
    "dirname",
    "du",
    "echo",
    "fd",
    "file",
    "find",
    "fmt",
    "fold",
    "git",
    "git diff",
    "git log",
    "git status",
    "go",
    "grep",
    "head",
    "javac",
    "join",
    "less",
    "ls",
    "md5sum",
    "mkdir",
    "more",
    "mvn",
    "nl",
    "node",
    "npm",
    "od",
    "paste",
    "pwd",
    "python3",
    "readlink",
    "rga",
    "rustc",
    "sd",
    "sha1sum",
    "sha256sum",
    "shasum",
    "sort",
    "stat",
    "sum",
    "tac",
    "tail",
    "tr",
    "tree",
    "uname",
    "uniq",
    "wc",
    "which",
    "whoami",
    "yarn",
]
denylist = [
    "rm",
    "rm -rf",
    "curl | bash",
    "wget | bash",
    "su",
    "passwd",
    "useradd",
    "usermod",
    "groupadd",
    "apt",
    "yum",
    "dnf",
    "pacman",
    "chmod -R",
    "chown",
    "chgrp",
    "dd",
    "mkfs",
    "gdb",
    "pdb",
    "strace",
    "tcpdump",
    "wireshark",
    "tshark",
    "nmap",
    "> /dev/sd*",
    "mv /",
    "cp -r /",
    "find",
    "sed",
]

[tools.grep]
permission = "always"

[tools.write_file]
permission = "ask"

[tools.task]
permission = "always"

[tools.todo]
permission = "always"

[tools.trackboi_switch_project]
permission = "always"

[tools.trackboi_add_track_decision]
permission = "always"

[tools.trackboi_move_card]
permission = "always"

[tools.trackboi_get_track]
permission = "always"

[tools.read]
permission = "always"
max_read_bytes = 262144

[tools.edit]
permission = "always"
allowlist = [
    "~/.vibe/skills/*",
    "./**/*",
]
denylist = [
    "~/.vibe/agents/*",
    "~/.vibe/config.toml",
    "~/.ssh/*",
    "/etc/*",
    "/usr/*",
    "/bin/*",
    "/sbin/*",
    "/lib/*",
]
