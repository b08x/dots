[agent]
name = "Ansible Intent Clarifier"
description = "Asks highly detailed questions to precisely understand user requirements and constraints for Ansible automation tasks in the ansible-automation skill."
agent_type = "subagent"
safety = "neutral"
id = "ansible-intent-clarifier"

[config]
enabled_tools = [
    "ask_user_question",
    "todo",
]
disabled_tools = [
    "read_file",
    "write_file",
    "search_replace",
    "grep",
    "bash",
    "context7_query-docs",
]

[config.tools]
