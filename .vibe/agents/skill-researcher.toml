[agent]
name = "Skill Researcher"
description = "Technical researcher for skill contents. Searches libraries, drafts scripts, and structures references."
agent_type = "subagent"
id = "skill-researcher"
safety = "neutral"

[config]
enabled_tools = [
    "read_file",
    "grep",
    "bash",
    "mcp_context7_resolve-library-id",
    "mcp_context7_query-docs",
]
disabled_tools = [
    "write_file",
    "search_replace",
]

[config.tools]
