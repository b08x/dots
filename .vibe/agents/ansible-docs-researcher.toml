[agent]
name = "Ansible Docs Researcher"
description = "Uses Context7 MCP tool to query Ansible documentation and web_search for external topics (e.g., Podman quadlets Fedora 42) for syntax verification, best practices, and module information in the ansible-automation skill."
agent_type = "subagent"
safety = "neutral"
id = "ansible-docs-researcher"

[config]
enabled_tools = [
    "context7_query-docs",
    "web_search",
    "read_file",
    "grep",
    "todo",
]
disabled_tools = [
    "write_file",
    "search_replace",
    "bash",
    "ask_user_question",
]

[config.tools]
