# .vibe/agents/ansible-docs-researcher.toml
display_name = "Ansible Docs Researcher"
description = "Uses Context7 MCP tool to query Ansible and Mistral Vibe documentation for syntax verification, best practices, and module information in the ansible-automation skill."
agent_type = "subagent"
safety = "neutral"

[config]
system_prompt_id = "ansible-docs-researcher"
auto_approve = true  # Safe read-only research operations

# Enable Context7 MCP tools for documentation research
enabled_tools = ["context7_query-docs", "read_file", "grep", "todo"]
disabled_tools = ["write_file", "search_replace", "bash", "ask_user_question"]

[config.tools.context7_query-docs]
permission = "always"

[config.tools.read_file]
permission = "always"

[config.tools.grep]
permission = "always"

[config.tools.todo]
permission = "always"
