# Stateful Agent Template  [NEW — was missing from skillpack]
# Variables: {agent_id}, {agent_name}, {description}, {safety_level}, {auto_approve}

id = "{agent_id}"
display_name = "{agent_name}"
description = """{description}"""
agent_type = "agent"
safety = "{safety_level}"
auto_approve = {auto_approve}
system_prompt_id = "{agent_id}"
user_invocable = true

enabled_tools = ["todo", "ask_user_question", "read_file", "write_file"]
disabled_tools = ["bash", "task"]

[tools.todo]
permission = "always"

[tools.ask_user_question]
permission = "always"

[tools.read_file]
permission = "always"

[tools.write_file]
permission = "ask"

[session_logging]
session_prefix = "{agent_id}"
enabled = true
