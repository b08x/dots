# Single Agent Template
# Variables: {agent_id}, {agent_name}, {description}, {safety_level}, {auto_approve},
#            {system_prompt_id}, {user_invocable}, {enabled_tools}, {disabled_tools}

id = "{agent_id}"
display_name = "{agent_name}"
description = """{description}"""
agent_type = "agent"
safety = "{safety_level}"
auto_approve = {auto_approve}
system_prompt_id = "{system_prompt_id}"
user_invocable = {user_invocable}

enabled_tools = {enabled_tools}
disabled_tools = {disabled_tools}

[tools.read_file]
permission = "always"

[tools.grep]
permission = "always"

[session_logging]
session_prefix = "{agent_id}"
enabled = true
