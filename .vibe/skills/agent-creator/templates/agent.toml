# Base Agent Template
# Variables: {agent_id}, {agent_name}, {description}, {agent_type}, {safety_level},
#            {auto_approve}, {system_prompt_id}, {user_invocable}, {enabled_tools}, {disabled_tools}
#
# FIX: enabled_tools/disabled_tools and [tools.*] are top-level — no [config] wrapper

id = "{agent_id}"
display_name = "{agent_name}"
description = """{description}"""
agent_type = "{agent_type}"
safety = "{safety_level}"
auto_approve = {auto_approve}
system_prompt_id = "{system_prompt_id}"
user_invocable = {user_invocable}

enabled_tools = {enabled_tools}
disabled_tools = {disabled_tools}

[tools.read_file]
permission = "always"

[tools.grep]
permission = "always"

[session_logging]
session_prefix = "{agent_id}"
enabled = true
