# Hybrid Pipeline Template
# Variables: {agent_id}, {agent_name}, {description}, {safety_level},
#            {enabled_tools}, {disabled_tools}

id = "{agent_id}"
display_name = "{agent_name}"
description = """{description}"""
agent_type = "agent"
safety = "{safety_level}"
auto_approve = false
system_prompt_id = "{agent_id}"
user_invocable = true

enabled_tools = {enabled_tools}
disabled_tools = {disabled_tools}

[tools.task]
permission = "always"

[tools.read_file]
permission = "always"

[tools.grep]
permission = "always"

[tools.ask_user_question]
permission = "always"

[session_logging]
session_prefix = "{agent_id}"
enabled = true
